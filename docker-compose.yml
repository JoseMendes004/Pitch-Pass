services:
  postgres:
    image: postgres:16-alpine
    container_name: pitchpass-db
    environment:
      POSTGRES_USER: pitchpass
      POSTGRES_PASSWORD: pitchpass123
      POSTGRES_DB: pitchpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pitchpass-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
